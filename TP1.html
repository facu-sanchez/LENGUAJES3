<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Primer Trabajo Práctico</title>
  <style>

    /* ── ESTILOS GENERALES ── */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: white;
      color: black;
    } 

    /* ── NAVEGACIÓN ── */
    nav {
      background-color: lightblue;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      color: white;
      font-size: 1.2rem;
      text-decoration: none;
    }

    /* Links del menú (pantallas grandes) */
    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
    }

    /* ── BOTÓN HAMBURGUESA ── */
    .hamburger {
      display: none; /* solo para pantallas chiquitas */
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .hamburger span {
      display: block;
      width: 25px;
      height: 3px;
      background-color: white;
    }

    /* ── MENÚ MÓVIL ── */
    .mobile-menu {
      display: none;
      background-color: black;
      padding: 10px 20px;
    }

    .mobile-menu.abierto {
      display: block;
    }

    .mobile-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .mobile-menu ul li {
      padding: 10px 0;
    }

    .mobile-menu a {
      color: white;
      text-decoration: none;
    }

    /* ── CUERPO ── */
    .contenido {
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .contenido h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
    }

    .contenido p {
      font-size: 1rem;
      line-height: 1.7;
    }

    /* ── PIE DE PÁGINA ── */
    footer {
      background-color: lightblue;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
    }

    /* ── RESPONSIVE: pantallas pequeñas ── */
    @media (max-width: 600px) {
      .nav-links {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }
  </style>
</head>
<body>

  <!-- NAVEGACIÓN -->
  <nav>
    <a class="nav-logo" href="#">Trabajo Práctico N°1</a>

    <!-- Menú normal (pantallas grandes) -->
    <ul class="nav-links">
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Botón 1</a></li>
      <li><a href="#">Botón 2</a></li>
    </ul>

    <!-- Botón hamburguesa (pantallas chicas) -->
    <button class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Menu movil desplegable -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Botón 1</a></li>
      <li><a href="#">Botón 2</a></li>
    </ul>
  </div>


  <!-- CUERPO -->
  <div class="contenido">
    <h1>Mis Primeras Páginas!!</h1>
    <p>Este es mi trabajo profe, al ser la primera vez que programo en HTML me apoyé en la IA para que quede estéticamente bueno. Muchas gracias.</p>
  </div>


  <!-- PIE DE PÁGINA -->
  <footer>
    <p>Facundo Sánchez Francés - 2026</p>
  </footer>


  <!-- JAVASCRIPT: para abrir y cerrar el menú -->
  <script>
    const boton = document.getElementById('hamburger');
    const menu  = document.getElementById('mobileMenu');

    boton.addEventListener('click', function () {
      menu.classList.toggle('abierto');
    });
  </script>
</body>
</html>
