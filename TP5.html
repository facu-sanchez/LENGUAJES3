<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro UCASAL - TP5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
        }
        .contenedor {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            margin: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #004494;
        }
        .errores {
            color: #d9534f;
            background-color: #fdf7f7;
            padding: 10px;
            margin-top: 15px;
            border-left: 4px solid #d9534f;
            display: none; 
        }
        .exito {
            color: #28a745;
            background-color: #f4fdf5;
            padding: 10px;
            margin-top: 15px;
            border-left: 4px solid #28a745;
            display: none; 
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h2>Registro de Usuario</h2>
    
    <form id="formularioRegistro">
        <div class="form-group">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre">
        </div>
        
        <div class="form-group">
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido">
        </div>
        
        <div class="form-group">
            <label for="email">Email institucional (@ucasal):</label>
            <input type="text" id="email" placeholder="usuario@ucasal.edu.ar">
        </div>
        
        <div class="form-group">
            <label for="fechaNacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fechaNacimiento">
        </div>
        
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password">
        </div>
        
        <div class="form-group">
            <label for="confirmPassword">Repetir Contraseña:</label>
            <input type="password" id="confirmPassword">
        </div>
        
        <button type="submit">Enviar</button>
    </form>

    <div id="cajaErrores" class="errores"></div>
    <div id="cajaExito" class="exito">Registro completado</div>
</div>

<script>
    //  escuchamos el evento submit cuando se presiona enviar
    document.getElementById('formularioRegistro').addEventListener('submit', function(evento) {
        
        // para evitar que la página se recargue automáticamente al enviar el formulario
        evento.preventDefault(); 
        
        // limpieza de mensajes anteriores
        const cajaErrores = document.getElementById('cajaErrores');
        const cajaExito = document.getElementById('cajaExito');
        cajaErrores.style.display = 'none';
        cajaErrores.innerHTML = '';
        cajaExito.style.display = 'none';

        // array para guardar todos los errores que se encuentrem
        let listaErrores = [];

        // obtener los valores de los inputs 
        const nombre = document.getElementById('nombre').value.trim();
        const apellido = document.getElementById('apellido').value.trim();
        const email = document.getElementById('email').value.trim();
        const fechaNacimiento = document.getElementById('fechaNacimiento').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // validacion de campos
        if (!nombre || !apellido || !email || !fechaNacimiento || !password || !confirmPassword) {
            listaErrores.push("Todos los campos son obligatorios.");
        }

        // validacion de nombre y apellido (solo letras, permite espacios y acentos)
        const soloLetras = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
        
        if (nombre.length <= 3 || !soloLetras.test(nombre)) {
            listaErrores.push("El nombre debe tener más de 3 caracteres y contener solo letras.");
        }
        
        if (apellido.length <= 3 || !soloLetras.test(apellido)) {
            listaErrores.push("El apellido debe tener más de 3 caracteres y contener solo letras.");
        }

        // 3. Validar Email institucional
        // Esta expresión regular exige que haya un texto, seguido de @ucasal y un dominio
        const formatoEmail = /^[a-zA-Z0-9._-]+@ucasal(\.[a-zA-Z]{2,})+$/;
        if (!formatoEmail.test(email)) {
            listaErrores.push("Debe ingresar un email institucional válido (ej: usuario@ucasal.edu.ar).");
        }

        // validar edad (mayor a 18 y menor a 40)
        if (fechaNacimiento) {
            const fechaNac = new Date(fechaNacimiento);
            const hoy = new Date();
            
            // calculo de la edad
            let edad = hoy.getFullYear() - fechaNac.getFullYear();
            const diferenciaMeses = hoy.getMonth() - fechaNac.getMonth();
            
            // ajuste de años en este si el usuario todavia no cumplio en el curso
            if (diferenciaMeses < 0 || (diferenciaMeses === 0 && hoy.getDate() < fechaNac.getDate())) {
                edad--;
            }

            if (edad <= 18 || edad >= 40) {
                listaErrores.push("Debe tener más de 18 años y menos de 40 años para registrarse.");
            }
        }

        // validacion de contraseña
        if (password !== confirmPassword) {
            listaErrores.push("Las contraseñas ingresadas no coinciden.");
        }

        //resultado de la validacion
        if (listaErrores.length > 0) {
            // Si hay errores los mostramos en la caja roja 
            cajaErrores.innerHTML = "<strong>Por favor, corrija los siguientes errores:</strong><br><br>" + listaErrores.join('<br>');
            cajaErrores.style.display = 'block';
        } else {
            // Si no hay errores muestro
            cajaExito.style.display = 'block';
        }
    });
</script>

</body>
</html>
