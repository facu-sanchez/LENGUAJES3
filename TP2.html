<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Primer Trabajo Práctico - Carrusel</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* ── ESTILOS GENERALES ── */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: white;
      color: black;
    } 

    /* ── NAVEGACIÓN (Personalizada) ── */
    nav {
      background-color: lightblue;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      color: white;
      font-size: 1.2rem;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      color: white;
      text-decoration: none;
    }

    /* Ajuste para que las imágenes del carrusel no sean gigantes */
    .carousel-item img {
      height: 400px;
      object-fit: cover;
    }

    /* ── BOTÓN HAMBURGUESA ── */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
    }

    .hamburger span {
      display: block;
      width: 25px;
      height: 3px;
      background-color: white;
    }

    /* ── MENÚ MÓVIL ── */
    .mobile-menu {
      display: none;
      background-color: #333;
      padding: 10px 20px;
    }

    .mobile-menu.abierto {
      display: block;
    }

    .mobile-menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .mobile-menu a {
      color: white;
      text-decoration: none;
      display: block;
      padding: 10px 0;
    }

    /* ── CUERPO ── */
    .contenido {
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── PIE DE PÁGINA ── */
    footer {
      background-color: lightblue;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 0.85rem;
      margin-top: 20px;
    }

    footer a {
        color: #fff;
        text-decoration: underline;
    }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .carousel-item img { height: 250px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="#">Trabajo Práctico N°1</a>
    <ul class="nav-links">
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Botón 1</a></li>
      <li><a href="#">Botón 2</a></li>
    </ul>
    <button class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#">Inicio</a></li>
      <li><a href="#">Botón 1</a></li>
      <li><a href="#">Botón 2</a></li>
    </ul>
  </div>

 <div id="carouselExample" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-inner">
      
      <div class="carousel-item active">
        <img src="imagenes carrusel/maravilla.jpeg" class="d-block w-100" alt="Maravilla Martínez">
      </div>
      
      <div class="carousel-item">
        <img src="imagenes carrusel/GLVdM7cXYAAzXP_.jpeg" class="d-block w-100" alt="Jugador de Racing">
      </div>
      
      <div class="carousel-item">
        <img src="imagenes carrusel/hat tricki en el bernabel... digo digo el cilindro magico.jpeg" class="d-block w-100" alt="Hat trick">
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Anterior</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">Siguiente</span>
    </button>
  </div>

  <div class="contenido">
    <h1>Mis Primeras Páginas!!</h1>
    <p>Este es mi trabajo profe, ahora con un carrusel usando bootstrap. Esta libreria me deja mostrar las imágenes mejorando la interacción.</p>
    <p>Muchas gracias.</p>
  </div>

  <footer>
    <p>Facundo Sánchez Francés - 2026</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const boton = document.getElementById('hamburger');
    const menu  = document.getElementById('mobileMenu');

    boton.addEventListener('click', function () {
      menu.classList.toggle('abierto');
    });
  </script>
</body>
</html>
